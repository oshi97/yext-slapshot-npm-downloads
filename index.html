<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yext Slapshot NPM Downloads</title>
  <style>
    canvas {
      height: calc(100vh/3 - 10px);
    }
  </style>
</head>

<body>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  async function loadMonthlyChart(repo) {
    const container = document.createElement('canvas');
    container.id = `npm-downloads-chart_${repo}`
    document.body.appendChild(container);
    const endpoint = `https://api.npmjs.org/downloads/range/last-month/${repo}`
    const response = await (await fetch(endpoint)).json()
    const downloadsArray = response.downloads;

    const data = {
      labels: downloadsArray.map(d => {
        return new Date(d.day).toLocaleDateString('en', { day: 'numeric', month: 'numeric' })
      }),
      datasets: [{
        label: repo,
        backgroundColor: 'rgb(105, 205, 132)',
        borderColor: 'rgb(40, 159, 255)',
        data: downloadsArray.map(d => d.downloads),
      }]
    };
    const config = {
      type: 'line',
      data: data,
      options: {
        responsive: false
      }
    };
    new Chart(container, config);
  }
  loadMonthlyChart('jambo');
  loadMonthlyChart('@yext/answers-core');
  loadMonthlyChart('@yext/answers-search-ui');
</script>

</html>
